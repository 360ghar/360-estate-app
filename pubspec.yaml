name: estate_app
description: "360 Estate"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  app_links: ^6.4.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  file_picker: ^8.1.7
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  get: ^4.7.2
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.10.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1

  # Analytics & Monitoring
  firebase_core: ^3.10.0
  firebase_analytics: ^11.5.0
  firebase_crashlytics: ^4.3.0

  # UX improvements
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0


dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env

  # NOTE: .env file is NOT included in assets for security.
  # Use --dart-define for production builds:
  # flutter build apk --dart-define=API_BASE_URL=https://api.example.com
  # For local development, create a .env file in the project root (gitignored).
